<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FinFlow - Personal finance dashboard for balances, spending trends, transactions, and actionable insights."
    />
    <title>FinFlow - Finance Dashboard</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('finflow-store');
          var theme = 'dark';

          if (raw) {
            var parsed = JSON.parse(raw);
            theme = parsed && parsed.state && parsed.state.theme ? parsed.state.theme : theme;
          }

          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          document.documentElement.classList.toggle('light', theme === 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (error) {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
